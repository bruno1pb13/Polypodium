name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── Extrai versão e build number do tag (compartilhado entre os jobs) ──────
  version:
    runs-on: ubuntu-latest
    outputs:
      build_name: ${{ steps.get_version.outputs.BUILD_NAME }}
      build_number: ${{ steps.get_version.outputs.BUILD_NUMBER }}
      tag_name: ${{ steps.get_version.outputs.TAG_NAME }}
    steps:
      - name: Extract version from tag
        id: get_version
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION=${TAG_NAME#v}
          # Accept both v2.3.2 (preferred) and the legacy spelling v.2.3.2.
          VERSION=${VERSION#.}
          if [[ $VERSION =~ ^([0-9]+\.[0-9]+\.[0-9]+)(\+([0-9]+))?$ ]]; then
            BUILD_NAME=${BASH_REMATCH[1]}
            BUILD_NUMBER=${BASH_REMATCH[3]:-$GITHUB_RUN_NUMBER}
          else
            echo "Invalid release tag '$TAG_NAME'. Use vX.Y.Z or vX.Y.Z+BUILD (for example, v2.3.2)." >&2
            exit 1
          fi
          echo "BUILD_NAME=$BUILD_NAME" >> $GITHUB_OUTPUT
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_OUTPUT

  # ── Android APK + AAB (Google Play) ────────────────────────────────────────
  build-android:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/upload-keystore.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=../upload-keystore.jks
          EOF

      - name: Build APK
        run: |
          flutter build apk --release \
            --build-name=${{ needs.version.outputs.build_name }} \
            --build-number=${{ needs.version.outputs.build_number }}

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Build AAB (Google Play)
        run: |
          flutter build appbundle --release \
            --build-name=${{ needs.version.outputs.build_name }} \
            --build-number=${{ needs.version.outputs.build_number }}

      - uses: actions/upload-artifact@v4
        with:
          name: aab
          path: build/app/outputs/bundle/release/app-release.aab

  # ── Linux AppImage ─────────────────────────────────────────────────────────
  build-linux:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libgtk-3-dev libnotify-dev \
            ninja-build cmake pkg-config \
            libfuse2

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      - run: flutter config --enable-linux-desktop
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs

      - name: Download appimagetool
        run: |
          sudo wget -q -O /usr/local/bin/appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          sudo chmod +x /usr/local/bin/appimagetool

      - name: Build AppImage
        env:
          BUILD_NAME: ${{ needs.version.outputs.build_name }}
          BUILD_NUMBER: ${{ needs.version.outputs.build_number }}
        run: ./linux/packaging/build_appimage.sh

      - uses: actions/upload-artifact@v4
        with:
          name: appimage
          path: build/Polypodium-x86_64.AppImage

  # ── Windows MSIX & ZIP ─────────────────────────────────────────────────────
  build-windows:
    needs: version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows
        shell: powershell
        env:
          BUILD_NAME: ${{ needs.version.outputs.build_name }}
          BUILD_NUMBER: ${{ needs.version.outputs.build_number }}
          MSIX_IDENTITY_NAME: ${{ vars.MSIX_IDENTITY_NAME }}
          MSIX_PUBLISHER: ${{ vars.MSIX_PUBLISHER }}
        run: .\windows\packaging\build_windows.ps1

      - uses: actions/upload-artifact@v4
        with:
          name: windows-msix
          path: build/windows/x64/runner/Release/Polypodium.msix

      - uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: build/Polypodium-Windows-Portable.zip

  # ── GitHub Release (agrega APK + AppImage + Windows) ───────────────────────
  release:
    needs: [version, build-android, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: apk
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: aab
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: appimage
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: windows-msix
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: windows-portable
          path: artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/app-release.apk
            artifacts/app-release.aab
            artifacts/Polypodium-x86_64.AppImage
            artifacts/Polypodium.msix
            artifacts/Polypodium-Windows-Portable.zip
          name: Release ${{ needs.version.outputs.tag_name }}
          tag_name: ${{ needs.version.outputs.tag_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
