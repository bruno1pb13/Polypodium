name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── Extrai versão e build number do tag (compartilhado entre os jobs) ──────
  version:
    runs-on: ubuntu-latest
    outputs:
      build_name: ${{ steps.get_version.outputs.BUILD_NAME }}
      build_number: ${{ steps.get_version.outputs.BUILD_NUMBER }}
      tag_name: ${{ steps.get_version.outputs.TAG_NAME }}
    steps:
      - name: Extract version from tag
        id: get_version
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION=${TAG_NAME#v}
          if [[ $VERSION == *"+"* ]]; then
            BUILD_NAME=$(echo $VERSION | cut -d'+' -f1)
            BUILD_NUMBER=$(echo $VERSION | cut -d'+' -f2)
          else
            BUILD_NAME=$VERSION
            BUILD_NUMBER=$GITHUB_RUN_NUMBER
          fi
          echo "BUILD_NAME=$BUILD_NAME" >> $GITHUB_OUTPUT
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_OUTPUT

  # ── Android APK ────────────────────────────────────────────────────────────
  build-apk:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK
        run: |
          flutter build apk --release \
            --build-name=${{ needs.version.outputs.build_name }} \
            --build-number=${{ needs.version.outputs.build_number }}

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: build/app/outputs/flutter-apk/app-release.apk

  # ── Linux AppImage ─────────────────────────────────────────────────────────
  build-linux:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libgtk-3-dev libnotify-dev \
            ninja-build cmake pkg-config \
            libfuse2

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      - run: flutter config --enable-linux-desktop
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs

      - name: Download appimagetool
        run: |
          sudo wget -q -O /usr/local/bin/appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          sudo chmod +x /usr/local/bin/appimagetool

      - name: Build AppImage
        run: ./linux/packaging/build_appimage.sh

      - uses: actions/upload-artifact@v4
        with:
          name: appimage
          path: build/Polypodium-x86_64.AppImage

  # ── GitHub Release (agrega APK + AppImage) ─────────────────────────────────
  release:
    needs: [version, build-apk, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: apk
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: appimage
          path: artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/app-release.apk
            artifacts/Polypodium-x86_64.AppImage
          name: Release ${{ needs.version.outputs.tag_name }}
          tag_name: ${{ needs.version.outputs.tag_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
