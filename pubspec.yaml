name: polypodium
description: App de acompanhamento de plantas - offline-first
publish_to: 'none'
version: 1.1.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.32.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3
  drift: ^2.18.0
  path_provider: ^2.1.3
  path: ^1.9.0
  image_picker: ^1.1.2
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  flutter_timezone: ^5.0.0
  workmanager: ^0.9.0
  uuid: ^4.4.0
  intl: ^0.19.0
  shared_preferences: ^2.5.5
  sqlite3: ^3.3.4
  http: ^1.2.1
  archive: ^3.6.1
  csv: ^6.0.0
  geolocator: ^13.0.2
  gal: ^2.3.2
  share_plus: ^13.2.0
  battery_plus: ^6.2.1

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_test:
    sdk: flutter
  drift_dev: ^2.18.0
  build_runner: ^2.4.11
  riverpod_generator: ^4.0.4
  mocktail: ^1.0.5
  flutter_lints: ^6.0.0
  msix: ^3.16.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/logo.png"
  web:
    generate: true
    image_path: "assets/images/logo.png"
  windows:
    generate: true
    image_path: "assets/images/logo.png"
  macos:
    generate: true
    image_path: "assets/images/logo.png"
  linux:
    generate: true
    image_path: "assets/images/logo.png"

msix_config:
  display_name: Polypodium
  publisher_display_name: zapperbrz
  publisher: CN=Polypodium
  identity_name: com.polypodium.polypodium
  msix_version: 1.1.0.0
  logo_path: assets/images/logo.png
  capabilities: internetClient, location

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/images/background.png
    - assets/data/flora_brasil.db
    - assets/soils/

  fonts:
    - family: CormorantGaramond
      fonts:
        - asset: assets/fonts/CormorantGaramond-VariableFont_wght.ttf
        - asset: assets/fonts/CormorantGaramond-Italic-VariableFont_wght.ttf
          style: italic
